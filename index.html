<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .card { background: #121214; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .val { font-size: 45px; font-weight: 900; color: #32d74b; margin: 10px 0; }
        input { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: #32d74b; color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }
        canvas { max-height: 150px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 10px; color: #888;">NET WORTH</div>
        <div class="val" id="nw">1000.00</div>
        <canvas id="c"></canvas>
    </div>
    <div class="card">
        <input type="number" id="w" placeholder="Weight (kg)">
        <input type="number" id="r" placeholder="Reps">
        <button class="btn" onclick="add()">CONFIRM TRADE</button>
    </div>
<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let chart;

    async function load() {
        const { data: p } = await sb.rpc('get_prediction_data', { t_user_id: uid });
        const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);
        const cur = p?.current || 0;
        document.getElementById('nw').innerText = (1000 + cur + (n*10)).toFixed(2);
        const ctx = document.getElementById('c').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type: 'line', data: { labels: ['Now', '30d', '60d'], datasets: [{ data: [cur, cur+10, cur+20], borderColor: '#32d74b' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } } });
    }

    async function add() {
        const weight = document.getElementById('w').value;
        const reps = document.getElementById('r').value;
        if(!weight || !reps) return;
        await sb.from('workouts').insert([{ user_id: uid, weight: weight, reps: reps, exercise: 'bench' }]);
        tg.HapticFeedback.notificationOccurred('success');
        load();
    }
    window.onload = load;
</script>
</body>
</html>
