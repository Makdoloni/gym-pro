<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI v30</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #32d74b; --gray: #666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        .capital-card { background: linear-gradient(160deg, #1a1a1a 0%, #000 100%); border-radius: 30px; padding: 30px 15px; border: 1px solid #222; text-align: center; margin-bottom: 15px; position: relative; overflow: hidden; }
        .price { font-size: 60px; font-weight: 900; letter-spacing: -3px; color: var(--accent); margin: 5px 0; }
        .label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; }

        /* Визуальный блок упражнения */
        .exercise-preview { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 20px; }
        .ex-icon { font-size: 40px; background: rgba(50,215,75,0.1); padding: 15px; border-radius: 15px; }
        .ex-info { text-align: left; }
        .ex-title { font-weight: bold; font-size: 18px; display: block; }
        .ex-muscle { font-size: 12px; color: var(--accent); text-transform: uppercase; }

        .chart-box { height: 140px; margin: 15px 0; position: relative; }
        .blur-overlay { position: absolute; right: 0; top: 0; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, #000 90%); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 11px; font-weight: bold; text-align: center; }

        .trade-panel { background: var(--card); padding: 20px; border-radius: 28px; border: 1px solid #222; }
        select, input { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 17px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="capital-card">
    <span class="label">Body Net Worth</span>
    <div class="price" id="nw">1000.00</div>
    <div class="chart-box">
        <canvas id="chart"></canvas>
        <div class="blur-overlay" id="lock">FUTURE LOCKED<br>Нужно 3 записи</div>
    </div>
</div>

<div class="exercise-preview" id="preview-box">
    <div class="ex-icon" id="ex-emoji">🏋️‍♂️</div>
    <div class="ex-info">
        <span class="ex-title" id="ex-display-name">Жим штанги</span>
        <span class="ex-muscle" id="ex-display-muscle">Целевая группа: ГРУДЬ</span>
    </div>
</div>

<div class="trade-panel">
    <select id="exercise" onchange="updatePreview()">
        <option value="bench" data-emoji="💪" data-name="Жим штанги" data-muscle="ГРУДЬ">Жим штанги (Грудь)</option>
        <option value="squat" data-emoji="🦵" data-name="Приседания" data-muscle="НОГИ">Приседания (Ноги)</option>
        <option value="deadlift" data-emoji="🧱" data-name="Становая тяга" data-muscle="СПИНА">Становая тяга (Спина)</option>
        <option value="pullups" data-emoji="🦇" data-name="Подтягивания" data-muscle="ВЕРХ СПИНЫ">Подтягивания (Спина)</option>
        <option value="biceps" data-emoji="🚀" data-name="Бицепс" data-muscle="РУКИ">Бицепс (Руки)</option>
    </select>
    <div style="display:flex; gap:10px;">
        <input type="number" id="weight" placeholder="Вес">
        <input type="number" id="reps" placeholder="Повторы">
    </div>
    <button class="btn-action" onclick="makeTrade()">Зафиксировать прибыль</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let myChart;

    function updatePreview() {
        const sel = document.getElementById('exercise');
        const opt = sel.options[sel.selectedIndex];
        document.getElementById('ex-emoji').innerText = opt.dataset.emoji;
        document.getElementById('ex-display-name').innerText = opt.dataset.name;
        document.getElementById('ex-display-muscle').innerText = "Целевая группа: " + opt.dataset.muscle;
    }

    async function sync() {
        const { data: p } = await sb.rpc('get_prediction_data', { t_user_id: uid });
        const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);
        const cur = p?.current || 0;
        document.getElementById('nw').innerText = (1000 + cur + (n*15)).toFixed(2);
        if (n >= 3) document.getElementById('lock').style.display = 'none';
        draw(cur);
    }

    async function makeTrade() {
        const w = document.getElementById('weight').value;
        const r = document.getElementById('reps').value;
        if(!w || !r) return;
        await sb.from('workouts').insert([{
            user_id: uid, weight: parseFloat(w), reps: parseInt(r), exercise: document.getElementById('exercise').value
        }]);
        tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('weight').value = '';
        sync();
    }

    function draw(v) {
        const ctx = document.getElementById('chart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Сейчас', '30д', '60д'],
                datasets: [{ data: [v, v+10, v+20], borderColor: '#32d74b', tension: 0.4, fill: true, backgroundColor: 'rgba(50,215,75,0.05)', pointRadius: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
        });
    }

    window.onload = () => { sync(); updatePreview(); };
</script>
</body>
</html>
