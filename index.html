<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой Капитал Тела</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --accent: #32d74b; --card: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        .main-card { background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 25px; padding: 25px; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        .price { font-size: 50px; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .stat-val { font-size: 20px; font-weight: bold; }

        .input-group { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #222; }
        select, input { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; font-size: 18px; cursor: pointer; }

        .chart-box { height: 150px; margin: 20px 0; position: relative; }
        .lock-overlay { position: absolute; right: 0; top: 0; width: 50%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; border-radius: 0 20px 20px 0; color: var(--accent); font-size: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="main-card">
    <span class="label">Твоя ценность (в баллах)</span>
    <div class="price" id="total-val">1000.00</div>
    <div id="status-text" style="font-size: 12px; opacity: 0.7;">Рынок активен</div>
    
    <div class="chart-box">
        <canvas id="myChart"></canvas>
        <div class="lock-overlay" id="lock">БУДУЩЕЕ ЗАБЛОКИРОВАНО<br>Нужно 3 тренировки</div>
    </div>
</div>

<div class="stats">
    <div class="stat-box"><span class="label">Сила</span><div class="stat-val" id="power">0.0</div></div>
    <div class="stat-box"><span class="label">Дисциплина</span><div class="stat-val" id="streak">0.0</div></div>
</div>

<div class="input-group">
    <span class="label">Записать тренировку</span>
    <select id="exercise">
        <option value="bench">Жим лежа (Грудь)</option>
        <option value="squat">Приседания (Ноги)</option>
        <option value="pullups">Подтягивания (Спина)</option>
        <option value="press">Жим гантелей (Плечи)</option>
        <option value="deadlift">Становая тяга (Всё тело)</option>
        <option value="biceps">Бицепс (Руки)</option>
    </select>
    <div style="display:flex; gap:10px;">
        <input type="number" id="weight" placeholder="Вес (кг)">
        <input type="number" id="reps" placeholder="Повторы">
    </div>
    <button class="btn" onclick="saveData()">ЗАФИКСИРОВАТЬ ПРИБЫЛЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let chart;

    async function loadData() {
        const { data: p } = await sb.rpc('get_prediction_data', { t_user_id: uid });
        const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);
        
        const currentPower = p?.current || 0;
        const discipline = (n || 0) * 15;
        
        document.getElementById('total-val').innerText = (1000 + currentPower + discipline).toFixed(2);
        document.getElementById('power').innerText = currentPower.toFixed(1);
        document.getElementById('streak').innerText = discipline.toFixed(0);
        
        if (n >= 3) document.getElementById('lock').style.display = 'none';
        
        drawChart(currentPower);
    }

    async function saveData() {
        const w = document.getElementById('weight').value;
        const r = document.getElementById('reps').value;
        if(!w || !r) return;

        await sb.from('workouts').insert([{
            user_id: uid,
            weight: parseFloat(w),
            reps: parseInt(r),
            exercise: document.getElementById('exercise').value
        }]);

        tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('weight').value = '';
        document.getElementById('reps').value = '';
        loadData();
    }

    function drawChart(v) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Сегодня', '30 дней', '60 дней'],
                datasets: [{
                    data: [v, v+10, v+20],
                    borderColor: '#32d74b',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(50,215,75,0.1)'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { ticks: { color: '#666' } } }
            }
        });
    }

    tg.expand();
    window.onload = loadData;
</script>
</body>
</html>
