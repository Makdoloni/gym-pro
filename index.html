<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI v23</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Дизайн "Bloomberg Terminal" */
        :root { --bg: #000; --card: #121214; --accent: #32d74b; --blue: #0a84ff; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 12px; user-select: none; }
        
        .header { padding: 30px 15px; background: linear-gradient(180deg, #1c1c1e 0%, #000 100%); border-radius: 28px; border: 1px solid #222; text-align: center; margin-bottom: 12px; }
        .net-worth { font-size: 54px; font-weight: 900; letter-spacing: -3px; margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        .asset-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .asset-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .label { font-size: 9px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .val { font-size: 20px; font-weight: 800; }

        input, select { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 14px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn-trade { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 17px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-trade:active { transform: scale(0.96); }
        
        .chart-container { height: 180px; margin: 15px 0; position: relative; }
        
        /* Эффект "Размытого Будущего" (Психологический триггер v5) */
        .future-blur { position: absolute; right: 0; top: 0; width: 45%; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.9) 70%); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center; border-radius: 0 20px 20px 0; }
    </style>
</head>
<body>

<div class="header">
    <div style="background: rgba(50,215,75,0.1); color: var(--accent); display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px;">READY</div>
    <span class="label">Body Net Worth</span>
    <div class="net-worth" id="net-worth-val">1000.00</div>
    <div style="color: var(--accent); font-weight: bold; font-size: 13px;" id="prediction-msg">Анализ будущего...</div>
    
    <div class="chart-container">
        <canvas id="predictionChart"></canvas>
        <div class="future-blur" id="blur-overlay">FUTURE LOCKED</div>
    </div>
</div>

<div class="asset-row">
    <div class="asset-box"><span class="label">Strength Index</span><div class="val" id="str-val">0.0</div></div>
    <div class="asset-box"><span class="label">Discipline</span><div class="val" id="dis-val">0.0</div></div>
</div>

<div class="asset-box" style="margin-bottom:12px;">
    <h3 style="margin:0 0 12px 0; font-size:11px; color:var(--gray); text-transform: uppercase;">Confirm Investment</h3>
    <select id="ex">
        <option value="bench">Жим штанги</option>
        <option value="squat">Приседания</option>
        <option value="pullups">Подтягивания</option>
    </select>
    <div style="display:flex; gap:10px;">
        <input type="number" id="w" placeholder="Вес (кг)">
        <input type="number" id="r" placeholder="Повторы">
    </div>
    <button class="btn-trade" onclick="handleTrade()">Confirm Trade</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- SUPABASE CONFIG (ЗАМЕНИ НА СВОИ КЛЮЧИ) ---
    const S_URL = 'СЮДА_ВСТАВЬ_URL_ИЗ_SETTINGS_API'; 
    const S_KEY = 'СЮДА_ВСТАВЬ_sb_publishable_anon_KEY';
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    const userId = tg.initDataUnsafe?.user?.id || "local_user_777";
    let chart;

    // 4.3 PREDICTION ENGINE (Логика прогнозирования)
    async function loadDashboard() {
        try {
            // Вызываем твою SQL функцию rpc
            const { data: pred, error } = await supabaseClient.rpc('get_prediction_data', { user_id: userId });
            
            // Получаем количество тренировок для Дисциплины
            const { count: sessions } = await supabaseClient
                .from('workouts')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', userId);

            if (error) throw error;

            const current = pred ? pred.current : 0;
            const f30 = pred ? pred.forecast_30d : 10;
            const f60 = pred ? pred.forecast_60d : 20;
            const discipline = (sessions || 0) * 10; // +10 pts за тренировку

            // Обновляем UI
            document.getElementById('net-worth-val').innerText = (current + 1000 + discipline).toFixed(2);
            document.getElementById('str-val').innerText = current.toFixed(1);
            document.getElementById('dis-val').innerText = discipline.toFixed(1);
            document.getElementById('prediction-msg').innerText = `Прогноз (60д): ${f60} кг`;

            // 5.1 FUTURE BLUR (Разблокировка будущего)
            // Условие: Нужно 3 или более тренировок
            if ((sessions || 0) >= 3) {
                document.getElementById('blur-overlay').style.display = 'none';
            }

            updateChart(current, f30, f60);

        } catch (err) {
            console.error("Критическая ошибка loadData:", err);
            updateChart(0, 10, 20); // Заглушка если нет связи
        }
    }

    // 4.1 STRENGTH PROGRESSION ENGINE
    async function handleTrade() {
        const wInput = document.getElementById('w');
        const rInput = document.getElementById('r');
        const w = parseFloat(wInput.value);
        const r = parseInt(rInput.value);
        
        if(!w || !r) return tg.showAlert("Заполни данные!");

        tg.HapticFeedback.impactOccurred('medium');

        try {
            const { error } = await supabaseClient.from('workouts').insert([{
                user_id: userId, 
                exercise: document.getElementById('ex').value, 
                weight: w, 
                reps: r
            }]);

            if(error) throw error;

            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("ИНВЕСТИЦИЯ ПРИНЯТА!");
            wInput.value = ""; rInput.value = ""; // Очищаем поля
            loadDashboard(); // Обновляем экран

        } catch (err) {
            tg.showAlert("Ошибка базы: " + err.message);
        }
    }

    // Визуализация прогноза
    function updateChart(curr, f30, f60) {
        const ctx = document.getElementById('predictionChart').getContext('2d');
        if (chart) chart.destroy();
        
        // Массив данных: Сегодня, 30д, 60д
        const dataPoint = [curr, f30, f60];
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Сегодня', '30д', '60д'],
                datasets: [{
                    label: 'Прогноз',
                    data: dataPoint,
                    borderColor: '#32d74b',
                    borderDash: [5, 5], // Пунктир (будущее)
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(50, 215, 75, 0.05)',
                    pointRadius: 6, pointBackgroundColor: '#32d74b',
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, ticks: { color: '#8e8e93' } } 
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = loadDashboard;
</script>

</body>
</html>
