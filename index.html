<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI v33</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #0c0c0d; --accent: #32d74b; --dim: #8e8e93; --danger: #ff3b30; }
        body { font-family: 'SF Mono', monospace; background: var(--bg); color: #fff; margin: 0; padding: 12px; }
        
        .header { padding: 20px 10px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Экран последней тренировки */
        .last-workout-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .ex-row:last-child { border: none; }
        .ex-info { display: flex; align-items: center; gap: 10px; }
        .ex-val { font-weight: bold; color: var(--accent); }

        /* Кнопки действий */
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #1a1a1c; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 18px; font-size: 14px; cursor: pointer; }
        
        /* Модалка редактирования */
        #editor { display: none; position: fixed; inset: 0; background: #000; padding: 20px; z-index: 100; }
        .edit-item { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .remove-btn { color: var(--danger); font-size: 12px; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<div id="main-screen">
    <div class="header">
        <span class="label">Твоя ценность растет</span>
        <div style="font-size: 32px; font-weight: 900;" id="user-nw">1000.00</div>
    </div>

    <div class="label" style="margin-bottom: 10px; display: block;">Последняя тренировка</div>
    <div class="last-workout-card" id="last-workout-container">
        <div style="color: var(--dim); text-align: center; padding: 20px;">Загрузка истории...</div>
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="repeatWorkout(true)">🚀 ПРИМЕНИТЬ ПРОГРЕСС (+2.5кг)</button>
        <button class="btn-sec" onclick="repeatWorkout(false)">🔁 ПОВТОРИТЬ КАК БЫЛО</button>
        <button class="btn-sec" onclick="openEditor()">⚙️ ИЗМЕНИТЬ СОСТАВ</button>
    </div>
</div>

<div id="editor">
    <div class="header">
        <span class="label">Редактор тренировки</span>
    </div>
    <div id="editor-list"></div>
    <button class="btn-sec" onclick="closeEditor()" style="width: 100%; margin-top: 20px;">ВЕРНУТЬСЯ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    
    let lastExercises = [];

    async function loadLastWorkout() {
        // 6.1 Получаем последнюю сессию
        const { data: workouts } = await sb.from('workouts')
            .select('*')
            .eq('user_id', uid)
            .order('created_at', { ascending: false })
            .limit(5);

        if (!workouts || workouts.length === 0) {
            document.getElementById('last-workout-container').innerHTML = "Пока нет тренировок. Начни первую!";
            return;
        }

        // Берем уникальные последние упражнения
        lastExercises = workouts.map(w => ({
            id: w.id,
            name: w.exercise,
            weight: w.weight,
            reps: w.reps
        }));

        renderLastWorkout();
    }

    function renderLastWorkout() {
        const container = document.getElementById('last-workout-container');
        container.innerHTML = lastExercises.map(ex => `
            <div class="ex-row">
                <div class="ex-info"><span>💪</span> <b>${ex.name}</b></div>
                <div class="ex-val">${ex.weight}кг × ${ex.reps}</div>
            </div>
        `).join('');
    }

    async function repeatWorkout(improve) {
        tg.HapticFeedback.impactOccurred('medium');
        
        for (const ex of lastExercises) {
            const newWeight = improve ? parseFloat(ex.weight) + 2.5 : ex.weight;
            await sb.from('workouts').insert([{
                user_id: uid,
                exercise: ex.name,
                weight: newWeight,
                reps: ex.reps
            }]);
        }
        
        tg.showAlert(improve ? "Прогресс зафиксирован! +2.5кг к каждому весу." : "Тренировка повторена!");
        loadLastWorkout();
    }

    function openEditor() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        
        const list = document.getElementById('editor-list');
        list.innerHTML = lastExercises.map((ex, idx) => `
            <div class="edit-item">
                <span>${ex.name} (${ex.weight}кг)</span>
                <button class="remove-btn" onclick="removeEx(${idx})">УДАЛИТЬ</button>
            </div>
        `).join('');
    }

    function removeEx(idx) {
        lastExercises.splice(idx, 1);
        openEditor();
    }

    function closeEditor() {
        document.getElementById('editor').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        renderLastWorkout();
    }

    window.onload = loadLastWorkout;
</script>
</body>
</html>
