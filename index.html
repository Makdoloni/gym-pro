<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI v25</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #121214; --accent: #32d74b; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 12px; overflow: hidden; }
        
        .header { padding: 30px 15px; background: linear-gradient(180deg, #1c1c1e 0%, #000 100%); border-radius: 28px; border: 1px solid #222; text-align: center; margin-bottom: 12px; }
        .net-worth { font-size: 54px; font-weight: 900; letter-spacing: -3px; margin: 5px 0; }
        
        .asset-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .asset-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .label { font-size: 9px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .val { font-size: 20px; font-weight: 800; }

        input, select { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 14px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn-trade { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 17px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-trade:active { transform: scale(0.96); }
        
        .chart-container { height: 160px; margin: 15px 0; position: relative; }
        .future-blur { position: absolute; right: 0; top: 0; width: 45%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.95) 80%); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 10px; font-weight: bold; text-align: center; border-radius: 0 20px 20px 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="background: rgba(50,215,75,0.15); color: var(--accent); display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px;">СИСТЕМА: АКТИВНА</div>
    <span class="label">Body Net Worth</span>
    <div class="net-worth" id="nw-val">1000.00</div>
    <div style="color: var(--accent); font-weight: bold; font-size: 13px;" id="status-msg">Синхронизация...</div>
    
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
        <div class="future-blur" id="blur-overlay">FUTURE LOCKED<br><span style="font-size:7px; opacity:0.6">НУЖНО 3 ТРЕНИРОВКИ</span></div>
    </div>
</div>

<div class="asset-row">
    <div class="asset-box"><span class="label">Индекс Силы</span><div class="val" id="si-val">0.0</div></div>
    <div class="asset-box"><span class="label">Дисциплина</span><div class="val" id="di-val">0.0</div></div>
</div>

<div class="asset-box">
    <h3 style="margin:0 0 12px 0; font-size:11px; color:var(--gray); text-transform: uppercase;">Новая инвестиция</h3>
    <select id="ex-type">
        <option value="bench">Жим штанги</option>
        <option value="squat">Приседания</option>
        <option value="pullups">Подтягивания</option>
    </select>
    <div style="display:flex; gap:10px;">
        <input type="number" id="w-input" placeholder="Вес (кг)">
        <input type="number" id="r-input" placeholder="Повторы">
    </div>
    <button class="btn-trade" onclick="handleInvest()">Подтвердить сделку</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const S_URL = 'https://zgsvtvbwgbxyztyxynez.supabase.co';
    const S_KEY = 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS';
    const sb = supabase.createClient(S_URL, S_KEY);
    
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let chart;

    async function updateUI() {
        try {
            const { data: pred } = await sb.rpc('get_prediction_data', { t_user_id: uid });
            const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);

            const cur = pred?.current || 0;
            const f30 = pred?.f30 || cur + 10;
            const f60 = pred?.f60 || cur + 20;
            const discipline = (n || 0) * 15;

            document.getElementById('nw-val').innerText = (1000 + cur + discipline).toFixed(2);
            document.getElementById('si-val').innerText = cur.toFixed(1);
            document.getElementById('di-val').innerText = discipline.toFixed(1);
            document.getElementById('status-msg').innerText = `Прогноз (60д): +${(f60-cur).toFixed(0)} кг`;

            if (n >= 3) document.getElementById('blur-overlay').style.display = 'none';

            renderChart(cur, f30, f60);
        } catch (e) { console.error(e); }
    }

    async function handleInvest() {
        const w = document.getElementById('w-input').value;
        const r = document.getElementById('r-input').value;
        if(!w || !r) return;

        const { error } = await sb.from('workouts').insert([{
            user_id: uid,
            weight: parseFloat(w),
            reps: parseInt(r),
            exercise: document.getElementById('ex-type').value
        }]);

        if(!error) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('w-input').value = '';
            document.getElementById('r-input').value = '';
            updateUI();
        }
    }

    function renderChart(c, f1, f2) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Сейчас', '30д', '60д'],
                datasets: [{
                    data: [c, f1, f2],
                    borderColor: '#32d74b',
                    borderDash: [5, 5],
                    tension: 0.4,
                    pointRadius: 4,
                    fill: true,
                    backgroundColor: 'rgba(50, 215, 75, 0.05)'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, ticks: { color: '#8e8e93', font: { size: 10 } } } 
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = updateUI;
</script>
</body>
</html>
