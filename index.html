<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI Unicorn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #121214; --accent: #32d74b; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 12px; overflow: hidden; }
        .header { padding: 25px 15px; background: linear-gradient(180deg, #1c1c1e 0%, #000 100%); border-radius: 28px; border: 1px solid #222; text-align: center; margin-bottom: 12px; }
        .net-worth { font-size: 52px; font-weight: 900; letter-spacing: -2px; margin: 5px 0; color: #fff; }
        .asset-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .asset-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .label { font-size: 9px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .val { font-size: 19px; font-weight: 800; }
        input, select { background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 14px; width: 100%; box-sizing: border-box; margin-bottom: 8px; font-size: 16px; }
        .btn-trade { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 16px; text-transform: uppercase; cursor: pointer; }
        .chart-container { height: 150px; margin: 10px 0; position: relative; }
        .future-blur { position: absolute; right: 0; top: 0; width: 45%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.97) 80%); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 9px; font-weight: bold; text-align: center; border-radius: 0 20px 20px 0; }
    </style>
</head>
<body>
<div class="header">
    <span class="label">Body Net Worth</span>
    <div class="net-worth" id="nw">1000.00</div>
    <div id="msg" style="color:var(--accent); font-size:12px; font-weight:bold;">АНАЛИЗ РЫНКА ТЕЛА...</div>
    <div class="chart-container">
        <canvas id="ch"></canvas>
        <div class="future-blur" id="bl">FUTURE LOCKED<br>НУЖНО 3 ЗАПИСИ</div>
    </div>
</div>
<div class="asset-row">
    <div class="asset-box"><span class="label">Индекс Силы</span><div class="val" id="si">0.0</div></div>
    <div class="asset-box"><span class="label">Дисциплина</span><div class="val" id="di">0.0</div></div>
</div>
<div class="asset-box">
    <select id="ex">
        <option value="bench">Жим штанги</option>
        <option value="squat">Приседания</option>
        <option value="deadlift">Становая тяга</option>
        <option value="pullups">Подтягивания</option>
    </select>
    <div style="display:flex; gap:8px;">
        <input type="number" id="w" placeholder="Вес">
        <input type="number" id="r" placeholder="Повторы">
    </div>
    <button class="btn-trade" onclick="add()">ПОДТВЕРДИТЬ СДЕЛКУ</button>
</div>
<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let chart;

    async function load() {
        const { data: p } = await sb.rpc('get_prediction_data', { t_user_id: uid });
        const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);
        const cur = p?.current || 0;
        const d_v = (n || 0) * 15;
        document.getElementById('nw').innerText = (1000 + cur + d_v).toFixed(2);
        document.getElementById('si').innerText = cur.toFixed(1);
        document.getElementById('di').innerText = d_v.toFixed(1);
        if (n >= 3) document.getElementById('bl').style.display = 'none';
        showChart(cur, cur+10, cur+20);
    }

    async function add() {
        const weight = document.getElementById('w').value;
        const reps = document.getElementById('r').value;
        if(!weight || !reps) return;
        await sb.from('workouts').insert([{ user_id: uid, weight: weight, reps: reps, exercise: document.getElementById('ex').value }]);
        tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('w').value = '';
        load();
    }

    function showChart(v, f1, f2) {
        const ctx = document.getElementById('ch').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['Сейчас', '30д', '60д'], datasets: [{ data: [v, f1, f2], borderColor: '#32d74b', tension: 0.4, fill: true, backgroundColor: 'rgba(50,215,75,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#888' } } } }
        });
    }
    window.onload = load;
</script>
</body>
</html>
