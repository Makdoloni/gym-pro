<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress AI v31</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #0c0c0d; --accent: #32d74b; --gray: #444; --text-dim: #8e8e93; }
        body { font-family: 'SF Mono', monospace; background: var(--bg); color: #fff; margin: 0; padding: 12px; overflow: hidden; }
        
        /* Главный индикатор Капитала */
        .capital-header { padding: 30px 15px; background: linear-gradient(180deg, #161618 0%, #000 100%); border-radius: 32px; border: 1px solid #1c1c1e; text-align: center; margin-bottom: 12px; }
        .nw-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .nw-value { font-size: 56px; font-weight: 900; letter-spacing: -2px; color: #fff; margin: 5px 0; }
        
        /* Визуальный юнит упражнения (Action Unit) */
        .action-unit { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #222; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .unit-emoji { font-size: 32px; background: #1a1a1c; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 18px; border: 1px solid #333; }
        .unit-info { flex-grow: 1; }
        .unit-name { font-weight: 800; font-size: 18px; display: block; }
        .unit-target { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        /* Сетка ввода */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        input { background: #161618; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 16px; font-size: 18px; width: 100%; box-sizing: border-box; text-align: center; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-confirm { background: var(--accent); color: #000; border: none; padding: 22px; border-radius: 20px; font-weight: 900; width: 100%; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

        /* Мини-график прогноза */
        .forecast-box { height: 100px; margin-top: 10px; position: relative; }
        .lock-text { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent); font-weight: bold; border-radius: 15px; }
    </style>
</head>
<body>

<div class="capital-header">
    <span class="nw-title">Body Net Worth</span>
    <div class="nw-value" id="val-nw">1000.00</div>
    <div id="prediction-info" style="font-size: 11px; color: var(--accent);">TARGET: +2.5kg NEXT SESSION</div>
</div>

<div class="action-unit" id="active-unit">
    <div class="unit-emoji" id="u-emoji">💪</div>
    <div class="unit-info">
        <span class="unit-target" id="u-muscle">ГРУДЬ</span>
        <span class="unit-name" id="u-name">Жим штанги</span>
    </div>
</div>

<select id="ex-select" onchange="updateUnit()" style="background: #161618; color: #fff; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 12px; font-size: 14px;">
    <option value="bench" data-m="ГРУДЬ" data-e="💪" data-n="Жим штанги">Жим штанги (Chest)</option>
    <option value="squat" data-m="НОГИ" data-e="🦵" data-n="Приседания">Приседания (Legs)</option>
    <option value="pullups" data-m="СПИНА" data-e="🦇" data-n="Подтягивания">Подтягивания (Back)</option>
    <option value="ohp" data-m="ПЛЕЧИ" data-e="🛡️" data-n="Жим армейский">Жим плечи (Shoulders)</option>
</select>

<div class="input-grid">
    <input type="number" id="in-w" placeholder="ВЕС">
    <input type="number" id="in-r" placeholder="РЕПС">
</div>

<button class="btn-confirm" onclick="execute()">CONFIRM ACTION</button>

<div class="forecast-box">
    <canvas id="fChart"></canvas>
    <div class="lock-text" id="lock-msg">FORECAST LOCKED: NEED 3 SESSIONS</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const sb = supabase.createClient('https://zgsvtvbwgbxyztyxynez.supabase.co', 'sb_publishable_HPZQa10In3R3s6siI4ttAQ_QpWWZmgS');
    const uid = String(tg.initDataUnsafe?.user?.id || "796100711");
    let chart;

    function updateUnit() {
        const s = document.getElementById('ex-select');
        const o = s.options[s.selectedIndex];
        document.getElementById('u-emoji').innerText = o.dataset.e;
        document.getElementById('u-name').innerText = o.dataset.n;
        document.getElementById('u-muscle').innerText = o.dataset.m;
    }

    async function sync() {
        const { data: p } = await sb.rpc('get_prediction_data', { t_user_id: uid });
        const { count: n } = await sb.from('workouts').select('*', { count: 'exact', head: true }).eq('user_id', uid);
        const cur = p?.current || 0;
        document.getElementById('val-nw').innerText = (1000 + cur + (n*15)).toFixed(2);
        if (n >= 3) document.getElementById('lock-msg').style.display = 'none';
        render(cur);
    }

    async function execute() {
        const w = document.getElementById('in-w').value;
        const r = document.getElementById('in-r').value;
        if(!w || !r) return;
        await sb.from('workouts').insert([{ user_id: uid, weight: w, reps: r, exercise: document.getElementById('ex-select').value }]);
        tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('in-w').value = '';
        sync();
    }

    function render(v) {
        const ctx = document.getElementById('fChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['Now', '30d', '60d'], datasets: [{ data: [v, v+10, v+20], borderColor: '#32d74b', tension: 0.4, fill: true, backgroundColor: 'rgba(50,215,75,0.05)', pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    tg.expand();
    window.onload = () => { sync(); updateUnit(); };
</script>
</body>
</html>
